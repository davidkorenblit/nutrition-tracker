version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # For Azure Container Apps / ACR, swap build for:
    # image: <your-acr>.azurecr.io/nutrition-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false   # NEVER committed to git — Azure uses App Service env vars
    environment:
      - PORT=8000
      - WORKERS=3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    # For Azure Container Apps / ACR, swap build for:
    # image: <your-acr>.azurecr.io/nutrition-frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped